# Override de portas para VPS compartilhada com outros sistemas (ex: ZAPAI
# usando 5432/6379 nativamente). Uso: docker compose -f docker-compose.yml
# -f docker-compose.vps.yml up -d
# As portas INTERNAS (rede docker) continuam as padrao - so a porta exposta
# no HOST muda, entao DATABASE_URL/REDIS_URL internos nao precisam mudar.
services:
  postgres:
    ports:
      - '5433:5432'

  redis:
    ports:
      - '6380:6379'
