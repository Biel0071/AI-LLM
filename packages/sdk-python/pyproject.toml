[project]
name = "ai-platform-sdk"
version = "1.0.0"
description = "SDK Python oficial da AI Platform"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["requests>=2.31"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["ai_platform*"]
