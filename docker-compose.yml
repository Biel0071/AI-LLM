name: ai-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform
      POSTGRES_DB: aiplatform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiplatform']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cache autogerenciado: uma vez atingido o teto, o Redis descarta sozinho
    # as chaves menos usadas (LRU) em vez de crescer sem limite. Ajuste via
    # REDIS_MAXMEMORY no .env (padrao 256mb).
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    mem_limit: 320m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    mem_limit: 768m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aiplatform:aiplatform@postgres:5432/aiplatform?schema=public
      REDIS_URL: redis://redis:6379
      # Dentro do container, "localhost" nao alcanca servicos do host:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL_DOCKER:-http://host.docker.internal:8188}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - image-storage:/app/storage
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/v1/health | grep -q status']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    stop_grace_period: 30s

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    mem_limit: 768m
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aiplatform:aiplatform@postgres:5432/aiplatform?schema=public
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL_DOCKER:-http://host.docker.internal:8188}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - image-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ['CMD', 'node', '-e', 'process.kill(1,0)']
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s
    stop_grace_period: 60s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz | grep -q ok']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Observabilidade (opcional): docker compose --profile monitoring up ----------
  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  image-storage:
  promdata:
  grafanadata:
