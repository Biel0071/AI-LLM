name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install --workspaces --include-workspace-root

      - name: Prisma generate
        run: npx prisma generate --schema apps/api/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api.Dockerfile -t ai-platform-api:ci .

      - name: Build Worker image
        run: docker build -f docker/worker.Dockerfile -t ai-platform-worker:ci .

      - name: Build Dashboard image
        run: docker build -f docker/dashboard.Dockerfile -t ai-platform-dashboard:ci .
